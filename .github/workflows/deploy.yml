name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'webapp/**'
      - 'docs/**'
      - 'CLAUDE.md'
      - '*.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/bot_parser_eis
            git pull origin main
            /opt/bot_parser_eis/venv/bin/pip install -q -r requirements.txt
            systemctl restart bot-parser-eis
            sleep 2
            systemctl is-active bot-parser-eis
